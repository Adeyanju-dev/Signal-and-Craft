{% extends 'posts/base.html' %}
{% block title %}Delete {{ post.title }} | Signal &amp; Craft{% endblock %}
{% block content %}
<section class="mx-auto max-w-xl">
  <div class="rounded-[2rem] border border-rose-200 bg-white/90 p-8 text-center shadow-panel dark:border-rose-900 dark:bg-slate-900/85">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-rose-600 dark:text-rose-300">Delete article</p>
    <h1 class="mt-4 font-display text-4xl text-ink dark:text-white">Remove this article?</h1>
    <p class="mt-4 text-base leading-8 text-slate-600 dark:text-slate-300">
      <span class="font-semibold text-slate-900 dark:text-white">{{ post.title }}</span> will be removed from the journal archive.
    </p>

    <form method="POST" class="mt-8 flex flex-wrap justify-center gap-3">
      {% csrf_token %}
      <button type="submit" class="rounded-full bg-rose-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-rose-700">
        Delete article
      </button>
      <a href="{{ post.get_absolute_url }}" class="rounded-full border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:border-accent hover:text-accent dark:border-slate-700 dark:text-slate-200 dark:hover:border-teal-400 dark:hover:text-teal-300">
        Keep article
      </a>
    </form>
  </div>
</section>
{% endblock %}
