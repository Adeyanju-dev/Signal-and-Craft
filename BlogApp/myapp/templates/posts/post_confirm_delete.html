{% extends 'posts/base.html' %}
{% block content %}
<div class="max-w-lg mx-auto bg-white/80 dark:bg-slate-800/80 shadow-lg rounded-2xl p-8 text-center animate-fadeIn">
  <h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-100 mb-4">Delete Post</h2>
  <p class="text-gray-600 dark:text-gray-300 mb-6">Are you sure you want to delete <strong>"{{ post.title }}"</strong>?</p>

  <form method="POST">
    {% csrf_token %}
    <div class="flex justify-center gap-4">
      <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg transition-all hover:shadow-lg">Yes, Delete</button>
      <a href="{% url 'home' %}" class="bg-gray-300 dark:bg-slate-700 hover:bg-gray-400 dark:hover:bg-slate-600 text-gray-700 dark:text-gray-200 px-5 py-2 rounded-lg transition-all hover:shadow-md">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
