{% extends 'posts/base.html' %}
{% block content %}
<div class="max-w-lg mx-auto bg-white shadow-md rounded-xl p-8 text-center">
  <h2 class="text-2xl font-semibold text-gray-800 mb-4">Delete Post</h2>
  <p class="text-gray-600 mb-6">Are you sure you want to delete <strong>"{{ post.title }}"</strong>?</p>

  <form method="POST">
    {% csrf_token %}
    <div class="flex justify-center gap-4">
      <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg">Yes, Delete</button>
      <a href="{% url 'home' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-5 py-2 rounded-lg">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
