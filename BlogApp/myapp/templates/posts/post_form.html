{% extends 'posts/base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white/80 dark:bg-slate-800/80 shadow-lg rounded-2xl p-8 animate-fadeIn">
  <h2 class="text-2xl font-semibold mb-6 text-gray-800 dark:text-gray-100">
    {% if form_type == 'Edit' %} Edit Post {% else %} Create New Post {% endif %}
  </h2>

  <form method="POST" class="space-y-6">
    {% csrf_token %}
    <div>
      <label for="title" class="block text-gray-700 dark:text-gray-300 font-medium mb-1">Title</label>
      <input type="text" id="title" name="title" value="{{ post.title|default:'' }}" required
             class="w-full border border-gray-300 dark:border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-transparent">
    </div>

    <div>
      <label for="content" class="block text-gray-700 dark:text-gray-300 font-medium mb-1">Content</label>
      <textarea id="content" name="content" rows="8" required
                class="w-full border border-gray-300 dark:border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-transparent">{{ post.content|default:'' }}</textarea>
    </div>

    <button type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition-all hover:shadow-lg">
      {% if form_type == 'Edit' %} Update Post {% else %} Create Post {% endif %}
    </button>
  </form>
</div>
{% endblock %}
