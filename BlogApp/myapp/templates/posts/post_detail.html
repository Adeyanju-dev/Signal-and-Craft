{% extends 'posts/base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto bg-white shadow-md rounded-xl p-8">
  <h2 class="text-3xl font-bold text-gray-900 mb-3">{{ post.title }}</h2>
  <p class="text-sm text-gray-500 mb-6">{{ post.created_at|date:"F j, Y, g:i a" }}</p>
  <p class="text-gray-700 leading-relaxed mb-8">{{ post.content }}</p>

  <div class="flex gap-4">
    <a href="{% url 'post-edit' post.pk %}"
       class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded-lg transition-all">Edit</a>
    <a href="{% url 'post-delete' post.pk %}"
       class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg transition-all">Delete</a>
    <a href="{% url 'home' %}"
       class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-2 rounded-lg transition-all">Back</a>
  </div>
</div>
{% endblock %}
